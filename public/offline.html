<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | VUI Studify</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #050510;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: rgba(16, 16, 34, 0.8);
            border: 1px solid #2d2d3f;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.8;
            display: block;
        }
        button {
            background-color: #1a5c2a;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #144823;
        }
        svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SVG icon for offline status -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 011.897 10.364l-9 9-9-9a9 9 0 0110.364-1.897M12 10l-2 2m0 0l-2-2m2 2l2 2" />
        </svg>
        
        <h1>You're Offline</h1>
        <p>It seems your device has lost connection to the cosmic network. Please check your internet connection and try again to continue your study journey.</p>
        
        <button onclick="window.location.reload()">Try Reconnecting</button>
    </div>
</body>
</html>
