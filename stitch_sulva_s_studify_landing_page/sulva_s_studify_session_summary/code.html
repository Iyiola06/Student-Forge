<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sulva's Studify - Session Summary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-colors">
    /* Custom palette based on the provided image */
    :root {
      --bg-cream: #FDFBF7;
      --navy-dark: #103778;
      --gold: #D4AF37;
      --gold-light: #E8D399;
      --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    body {
      background-color: var(--bg-cream);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
  </style>
<style data-purpose="gauge-styling">
    /* Circular progress gauge styles */
    .gauge-container {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 0 auto;
    }
    .gauge-svg {
      transform: rotate(-90deg);
    }
    .gauge-bg {
      fill: none;
      stroke: var(--navy-dark);
      stroke-width: 14;
    }
    .gauge-progress {
      fill: none;
      stroke: var(--gold-light);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 628; /* Circumference of circle with r=100 */
      stroke-dashoffset: 450; /* Adjust this to change progress length */
    }
    .trophy-badge {
      position: absolute;
      top: 55px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .confetti {
      position: absolute;
      top: 30px;
      right: 10px;
      pointer-events: none;
    }
  </style>
</head>

<!-- BEGIN: Progress Gauge -->

<circle cx="65" cy="10" fill="#D4AF37" r="2"></circle>
</svg>
</div>
<svg class="gauge-svg" height="240" viewbox="0 0 220 220" width="240">
<!-- Main Navy Ring -->
<circle class="gauge-bg" cx="110" cy="110" r="100"></circle>

<span class="text-5xl font-bold text-[#1A1A1A]">+4%</span>
<span class="text-gray-500 font-medium text-sm mt-1">Mastery gained</span>

</div>
</div>
</section>
<!-- END: Statistics Grid -->
<!-- BEGIN: Weak Topics Section -->
<section class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] mb-10 overflow-hidden" data-purpose="weak-topics">
<div class="px-6 py-4 border-b border-gray-100">
<h2 class="text-sm font-bold text-[#1A1A1A]">Weak Topics Found</h2>
</div>
<ul class="divide-y divide-gray-100">
<li class="px-6 py-4 flex items-center">
<span class="w-2 h-2 bg-[#E55B5B] rounded-full mr-4"></span>

<!-- BEGIN: Action Buttons -->
